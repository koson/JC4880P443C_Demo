## IDF Component Manager Manifest File
dependencies:
  idf:
    version: '>=4.1.0'
  lvgl/lvgl: ^9.0.0
  espressif/esp_lcd_st7701: ^2.0.2
  espressif/esp_lcd_touch: ^1.1.0
  espressif/esp_lcd_touch_gt911: ^1.1.0

  # ESP32-P4 has no built-in WiFi silicon.
  # It uses an external coprocessor via these two components.
  # They provide the full esp_wifi API transparently —
  # the rest of the code (wifi_manager.c) is unchanged.
  espressif/esp_wifi_remote:
    version: ">=0.10,<2.0"
    rules:
      - if: "target in [esp32p4, esp32h2]"
  espressif/esp_hosted:
    version: "~2"
    rules:
      - if: "target in [esp32p4, esp32h2]"
